name: ShittimChest
options:
  bundleIdPrefix: ai.shittimchest
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  ShittimChestKit:
    path: ../shared/ShittimChestKit
  Swabble:
    path: ../../Swabble

schemes:
  ShittimChest:
    shared: true
    build:
      targets:
        ShittimChest: all
    test:
      targets:
        - ShittimChestTests

targets:
  ShittimChest:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: ShittimChestShareExtension
        embed: true
      - target: ShittimChestWatchApp
      - package: ShittimChestKit
      - package: ShittimChestKit
        product: ShittimChestChatUI
      - package: ShittimChestKit
        product: ShittimChestProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/ShittimChest.entitlements
        CODE_SIGN_STYLE: "$(SHITTIMCHEST_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SHITTIMCHEST_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SHITTIMCHEST_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SHITTIMCHEST_APP_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_APPINTENTS_METADATA: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: ShittimChest
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.shittimchest.ios
            CFBundleURLSchemes:
              - shittimchest
        CFBundleShortVersionString: "2026.2.27"
        CFBundleVersion: "20260227"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.shittimchest.ios.bgrefresh
        NSLocalNetworkUsageDescription: ShittimChest discovers and connects to your ShittimChest gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _shittimchest-gw._tcp
        NSCameraUsageDescription: ShittimChest can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: ShittimChest uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: ShittimChest can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: ShittimChest needs microphone access for voice wake.
        NSSpeechRecognitionUsageDescription: ShittimChest uses on-device speech recognition for voice wake.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  ShittimChestShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: ShittimChestKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SHITTIMCHEST_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SHITTIMCHEST_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SHITTIMCHEST_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SHITTIMCHEST_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: ShittimChest Share
        CFBundleShortVersionString: "2026.2.27"
        CFBundleVersion: "20260227"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  ShittimChestWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: ShittimChestWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ENABLE_APPINTENTS_METADATA: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SHITTIMCHEST_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: ShittimChest
        CFBundleShortVersionString: "2026.2.27"
        CFBundleVersion: "20260227"
        WKCompanionAppBundleIdentifier: "$(SHITTIMCHEST_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  ShittimChestWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(SHITTIMCHEST_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: ShittimChest
        CFBundleShortVersionString: "2026.2.27"
        CFBundleVersion: "20260227"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(SHITTIMCHEST_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  ShittimChestTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
    dependencies:
      - target: ShittimChest
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SHITTIMCHEST_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SHITTIMCHEST_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.shittimchest.ios.tests
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ShittimChest.app/ShittimChest"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: ShittimChestTests
        CFBundleShortVersionString: "2026.2.27"
        CFBundleVersion: "20260227"
