services:
  shittimchest-gateway:
    image: ${SHITTIMCHEST_IMAGE:-shittimchest:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SHITTIMCHEST_GATEWAY_TOKEN: ${SHITTIMCHEST_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${SHITTIMCHEST_CONFIG_DIR}:/home/node/.shittimchest
      - ${SHITTIMCHEST_WORKSPACE_DIR}:/home/node/.shittimchest/workspace
    ports:
      - "${SHITTIMCHEST_GATEWAY_PORT:-18789}:18789"
      - "${SHITTIMCHEST_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${SHITTIMCHEST_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  shittimchest-cli:
    image: ${SHITTIMCHEST_IMAGE:-shittimchest:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      SHITTIMCHEST_GATEWAY_TOKEN: ${SHITTIMCHEST_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${SHITTIMCHEST_CONFIG_DIR}:/home/node/.shittimchest
      - ${SHITTIMCHEST_WORKSPACE_DIR}:/home/node/.shittimchest/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
