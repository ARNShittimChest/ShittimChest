services:
  - type: web
    name: shittimchest
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: SHITTIMCHEST_STATE_DIR
        value: /data/.shittimchest
      - key: SHITTIMCHEST_WORKSPACE_DIR
        value: /data/workspace
      - key: SHITTIMCHEST_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: shittimchest-data
      mountPath: /data
      sizeGB: 1
